<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>Simple Interest Calculator</title>
</head>
<body>
    <div class="main-container">
        <h1>Simple Interest Calculator</h1>

        <div class="input-section">
            <label for="principal">Amount</label>
            <input type="number" id="principal">
        </div>

        <div class="input-section">
            <label for="rate">Interest Rate</label>
            <input type="range" id="rate" min="1" max="20" step="0.25" value="10.25" onchange="updateRate()">
            <span id="rate_val">10.25%</span>
        </div>

        <div class="input-section">
            <label for="years">No. of Years</label>
            <select id="years">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
            </select>
        </div>

        <button onclick="compute()">Compute Interest</button>

        <p id="result"></p>

        <footer>
            &copy; <span id="year"></span> IBM Skills Network
        </footer>
    </div>
    <script>
        document.getElementById("year").innerHTML = new Date().getFullYear();
    </script>
</body>
</html>
